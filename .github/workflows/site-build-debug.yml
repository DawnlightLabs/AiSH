name: Site Build Debug

on:
  push:
    branches:
      - agent/aish-0.3.0-lifecycle
    paths:
      - .github/workflows/site-build-debug.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/aish-0.3.0-lifecycle
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Capture site build
        shell: bash
        run: |
          set +e
          cd apps/site
          npm install --no-audit --no-fund > /tmp/aish-site-build.log 2>&1
          install_status=$?
          if [[ $install_status -eq 0 ]]; then
            npm run build >> /tmp/aish-site-build.log 2>&1
            build_status=$?
          else
            build_status=$install_status
          fi
          cd ../..
          {
            echo "exit_status=$build_status"
            echo
            cat /tmp/aish-site-build.log
          } > docs/site-build-debug.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/site-build-debug.txt
          git commit -m "Capture site build output" || true
          git push origin HEAD:agent/aish-0.3.0-lifecycle
