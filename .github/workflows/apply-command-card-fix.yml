name: Planner Contract

on:
  pull_request:
    branches:
      - main
    paths:
      - crates/aish-ai/**
      - crates/aish-provider/**
      - apps/provider-shell/**
      - .github/workflows/apply-command-card-fix.yml
  push:
    branches:
      - main
    paths:
      - crates/aish-ai/**
      - crates/aish-provider/**
      - apps/provider-shell/**
      - .github/workflows/apply-command-card-fix.yml

permissions:
  contents: read

jobs:
  planner-contract:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
      - run: cargo test -p aish-ai -p aish-provider
      - run: cargo check -p aish-provider-shell
