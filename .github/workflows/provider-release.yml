name: Provider Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag/version to publish"
        required: true
        default: "v0.2.0"
        type: string
      make_latest:
        description: "Mark this release as latest"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      prerelease:
        description: "Publish as prerelease"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  MAKE_LATEST: ${{ inputs.make_latest || 'true' }}
  PRERELEASE: ${{ inputs.prerelease || 'false' }}

jobs:
  release:
    name: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Ensure GitHub release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi

          release_flags=(--title "AiSH $RELEASE_TAG" --generate-notes --repo "$GH_REPO")

          if [[ "$PRERELEASE" == "true" ]]; then
            release_flags+=(--prerelease)
          fi

          if [[ "$MAKE_LATEST" == "true" ]]; then
            release_flags+=(--latest)
          else
            release_flags+=(--latest=false)
          fi

          gh release create "$RELEASE_TAG" "${release_flags[@]}"

  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact: aish-windows-x64.zip
            bin: target/release/aish.exe
          - name: windows-arm64
            os: windows-11-arm
            artifact: aish-windows-arm64.zip
            bin: target/release/aish.exe
          # GitHub-hosted Intel macOS runners are no longer reliably available.
          # Keep only Apple Silicon macOS release builds until an x64 self-hosted runner is added.
          - name: macos-arm64
            os: macos-14
            artifact: aish-macos-arm64.tar.gz
            bin: target/release/aish
          - name: linux-x64
            os: ubuntu-latest
            artifact: aish-linux-x64.tar.gz
            bin: target/release/aish
          - name: linux-arm64
            os: ubuntu-24.04-arm
            artifact: aish-linux-arm64.tar.gz
            bin: target/release/aish

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build provider shell
        run: cargo build --release -p aish-provider-shell

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item ${{ matrix.bin }} dist/aish.exe
          Compress-Archive -Path dist/aish.exe -DestinationPath ${{ matrix.artifact }} -Force

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.bin }}" dist/aish
          chmod +x dist/aish
          tar -czf "${{ matrix.artifact }}" -C dist aish

      - name: Checksum Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash ${{ matrix.artifact }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Set-Content "${{ matrix.artifact }}.sha256"

      - name: Checksum Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "${{ matrix.artifact }}" \
            "${{ matrix.artifact }}.sha256" \
            --repo "$GH_REPO" \
            --clobber

  scripts:
    name: publish-install-scripts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - name: Upload install scripts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "$RELEASE_TAG" \
            apps/site/public/install \
            apps/site/public/install.sh \
            apps/site/public/install.ps1 \
            --repo "$GH_REPO" \
            --clobber
