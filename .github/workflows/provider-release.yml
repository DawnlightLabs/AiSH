name: Provider Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag/version to publish"
        required: true
        default: "v0.2.0"
        type: string
      make_latest:
        description: "Mark this release as latest"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Publish as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  MAKE_LATEST: ${{ github.event_name == 'workflow_dispatch' && inputs.make_latest || true }}
  PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact: aish-windows-x64.zip
            bin: target/release/aish.exe
          - name: windows-arm64
            os: windows-11-arm
            artifact: aish-windows-arm64.zip
            bin: target/release/aish.exe
          - name: macos-x64
            os: macos-13
            artifact: aish-macos-x64.tar.gz
            bin: target/release/aish
          - name: macos-arm64
            os: macos-14
            artifact: aish-macos-arm64.tar.gz
            bin: target/release/aish
          - name: linux-x64
            os: ubuntu-latest
            artifact: aish-linux-x64.tar.gz
            bin: target/release/aish
          - name: linux-arm64
            os: ubuntu-24.04-arm
            artifact: aish-linux-arm64.tar.gz
            bin: target/release/aish

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build provider shell
        run: cargo build --release -p aish-provider-shell

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item ${{ matrix.bin }} dist/aish.exe
          Compress-Archive -Path dist/aish.exe -DestinationPath ${{ matrix.artifact }} -Force

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.bin }}" dist/aish
          chmod +x dist/aish
          tar -czf "${{ matrix.artifact }}" -C dist aish

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: AiSH ${{ env.RELEASE_TAG }}
          make_latest: ${{ env.MAKE_LATEST }}
          prerelease: ${{ env.PRERELEASE }}
          generate_release_notes: true
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scripts:
    name: publish-install-scripts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Publish install scripts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: AiSH ${{ env.RELEASE_TAG }}
          make_latest: ${{ env.MAKE_LATEST }}
          prerelease: ${{ env.PRERELEASE }}
          generate_release_notes: true
          files: |
            apps/site/public/install
            apps/site/public/install.sh
            apps/site/public/install.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
