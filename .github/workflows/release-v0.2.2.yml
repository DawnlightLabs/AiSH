name: Release v0.2.2

on:
  push:
    branches:
      - release/v0.2.2
    paths:
      - .github/workflows/release-v0.2.2.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Bump main and push release tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="0.2.2"
          TAG="v$VERSION"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists; no release action required."
            exit 0
          fi

          perl -0pi -e 's/^version = "[^"]+"/version = "'"$VERSION"'"/m' apps/provider-shell/Cargo.toml
          cargo generate-lockfile

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/provider-shell/Cargo.toml Cargo.lock

          if ! git diff --cached --quiet; then
            git commit -m "Bump AiSH to v$VERSION"
            git push origin HEAD:main
          fi

          git tag "$TAG"
          git push origin "$TAG"
