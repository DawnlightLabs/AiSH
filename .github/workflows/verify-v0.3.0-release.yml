name: Verify v0.3.0 Release

on:
  push:
    branches:
      - release/v0.3.0
    paths:
      - .github/workflows/verify-v0.3.0-release.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: release/v0.3.0

      - name: Snapshot stable release state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -u
          expected=(
            aish-windows-x64.zip
            aish-windows-x64.zip.sha256
            aish-windows-arm64.zip
            aish-windows-arm64.zip.sha256
            aish-macos-arm64.tar.gz
            aish-macos-arm64.tar.gz.sha256
            aish-linux-x64.tar.gz
            aish-linux-x64.tar.gz.sha256
            aish-linux-arm64.tar.gz
            aish-linux-arm64.tar.gz.sha256
            install
            install.sh
            install.ps1
          )

          mkdir -p docs
          error_file=$(mktemp)
          if data=$(gh release view v0.3.0 --repo "$GH_REPO" --json tagName,name,isDraft,isPrerelease,publishedAt,assets,body,url 2>"$error_file"); then
            mapfile -t names < <(jq -r '.assets[].name' <<<"$data")
            missing=()
            for asset in "${expected[@]}"; do
              if ! printf '%s\n' "${names[@]}" | grep -Fxq "$asset"; then
                missing+=("$asset")
              fi
            done

            missing_json='[]'
            if [[ ${#missing[@]} -gt 0 ]]; then
              missing_json=$(printf '%s\n' "${missing[@]}" | jq -R . | jq -s .)
            fi

            jq -n \
              --argjson verified "$( [[ ${#missing[@]} -eq 0 ]] && echo true || echo false )" \
              --argjson missing "$missing_json" \
              --argjson release "$data" \
              '{verified: $verified, missing: $missing, release: $release, error: null}' \
              > docs/release-v0.3.0-status.json
          else
            error=$(cat "$error_file")
            jq -n --arg error "$error" \
              '{verified: false, missing: [], release: null, error: $error}' \
              > docs/release-v0.3.0-status.json
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/release-v0.3.0-status.json
          git commit -m "Snapshot AiSH v0.3.0 release assets" || true
          git push origin HEAD:release/v0.3.0
