name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version, for example 1.2.2"
        required: true
        type: string
      publish_release:
        description: "Push vVERSION tag after the bump"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  bump:
    name: bump-version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          case "$VERSION" in
            v*) echo "Use 1.2.2, not v1.2.2" >&2; exit 1 ;;
          esac
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Version must look like 1.2.2" >&2
            exit 1
          fi
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists" >&2
            exit 1
          fi

      - name: Update package version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          perl -0pi -e 's/^version = "[^"]+"/version = "'"$VERSION"'"/m' apps/provider-shell/Cargo.toml
          cargo generate-lockfile

      - name: Commit bump
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/provider-shell/Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Bump AiSH to v$VERSION"
            git push
          fi

      - name: Push release tag
        if: inputs.publish_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"
