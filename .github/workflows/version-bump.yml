name: Release AiSH

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version, for example 0.4.6"
        required: true
        type: string
      make_latest:
        description: "Mark the GitHub release as latest"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      prerelease:
        description: "Publish as a prerelease"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  bump:
    name: bump-and-tag
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve and validate version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must look exactly like 0.4.6" >&2
            exit 1
          fi

          tag="v$version"
          if git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists. Use Provider Release to rebuild that existing tag." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Update package version
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          perl -0pi -e 's/^version = "[^"]+"/version = "'"$VERSION"'"/m' apps/provider-shell/Cargo.toml
          cargo generate-lockfile
          actual="$(sed -n 's/^version = "\([^"]*\)"/\1/p' apps/provider-shell/Cargo.toml | head -n1)"
          test "$actual" = "$VERSION"

      - name: Commit version and push tag
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/provider-shell/Cargo.toml Cargo.lock
          git commit -m "Bump AiSH to v$VERSION"
          git push origin HEAD:main
          git tag "$TAG"
          git push origin "$TAG"

  publish:
    name: build-and-publish
    needs: bump
    uses: ./.github/workflows/provider-release.yml
    with:
      version: ${{ needs.bump.outputs.tag }}
      make_latest: ${{ inputs.make_latest }}
      prerelease: ${{ inputs.prerelease }}
    secrets: inherit
