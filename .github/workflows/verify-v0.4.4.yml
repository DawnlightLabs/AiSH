name: Verify v0.4.4 Release

on:
  push:
    branches:
      - release/v0.4.4
    paths:
      - .github/workflows/verify-v0.4.4.yml
      - docs/verify-v0.4.4-trigger.txt

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: release/v0.4.4
          fetch-depth: 0
      - name: Wait for and verify release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          expected=(
            aish-windows-x64.zip
            aish-windows-x64.zip.sha256
            aish-windows-arm64.zip
            aish-windows-arm64.zip.sha256
            aish-macos-arm64.tar.gz
            aish-macos-arm64.tar.gz.sha256
            aish-linux-x64.tar.gz
            aish-linux-x64.tar.gz.sha256
            aish-linux-arm64.tar.gz
            aish-linux-arm64.tar.gz.sha256
            install
            install.sh
            install.ps1
          )

          for attempt in $(seq 1 40); do
            if release_json="$(gh release view v0.4.4 --repo "$GH_REPO" --json tagName,name,isDraft,isPrerelease,publishedAt,assets 2>/dev/null)"; then
              published="$(jq -r '.assets[].name' <<<"$release_json")"
              missing=()
              for file in "${expected[@]}"; do
                grep -Fxq "$file" <<<"$published" || missing+=("$file")
              done
              if [[ ${#missing[@]} -eq 0 ]]; then
                mkdir -p docs
                jq -n \
                  --argjson release "$release_json" \
                  --argjson expected "$(printf '%s\n' "${expected[@]}" | jq -R . | jq -s .)" \
                  '{verified: true, expected: $expected, missing: [], release: $release}' \
                  > docs/release-v0.4.4-status.json
                git config user.name github-actions[bot]
                git config user.email 41898282+github-actions[bot]@users.noreply.github.com
                git add docs/release-v0.4.4-status.json
                git commit -m "Verify AiSH v0.4.4 release assets" || true
                git push origin HEAD:release/v0.4.4
                exit 0
              fi
              echo "Release exists but is missing: ${missing[*]}"
            else
              echo "Release is not published yet (attempt $attempt/40)."
            fi
            sleep 15
          done

          echo "v0.4.4 release did not become complete in time" >&2
          exit 1
