name: Refresh icon lockfile

on:
  push:
    branches:
      - feature/windows-brand-icon

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feature/windows-brand-icon
      - uses: dtolnay/rust-toolchain@stable
      - name: Refresh Cargo.lock
        shell: bash
        run: |
          set -euo pipefail
          cargo generate-lockfile
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "Refresh Cargo.lock for Windows icon resources"
          git push origin HEAD:feature/windows-brand-icon
