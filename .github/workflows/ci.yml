name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  verify-actions-cleanup:
    runs-on: ubuntu-22.04
    steps:
      - name: Verify and finish Actions cleanup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          repo="$GITHUB_REPOSITORY"
          report="$RUNNER_TEMP/actions-cleanup-report.txt"
          deleted_runs=0

          keep_workflow() {
            case "$1" in
              .github/workflows/ci.yml|.github/workflows/version-bump.yml|.github/workflows/provider-release.yml|dynamic/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          while IFS=$'\t' read -r workflow_id workflow_name workflow_path workflow_state; do
            if keep_workflow "$workflow_path"; then
              continue
            fi

            gh api --method PUT "/repos/$repo/actions/workflows/$workflow_id/disable" >/dev/null 2>&1 || true

            mapfile -t run_ids < <(
              gh api --paginate "/repos/$repo/actions/workflows/$workflow_id/runs?per_page=100" \
                --jq '.workflow_runs[] | select(.status == "completed") | .id'
            )

            for run_id in "${run_ids[@]}"; do
              [[ -n "$run_id" ]] || continue
              gh api --method DELETE "/repos/$repo/actions/runs/$run_id" >/dev/null 2>&1 || true
              deleted_runs=$((deleted_runs + 1))
            done
          done < <(
            gh api --paginate "/repos/$repo/actions/workflows?per_page=100" \
              --jq '.workflows[] | [.id, .name, .path, .state] | @tsv'
          )

          {
            echo "AiSH Actions cleanup verification"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Additional obsolete runs deleted in verification pass: $deleted_runs"
            echo
            printf '%-36s %-62s %-22s %s\n' "WORKFLOW" "PATH" "STATE" "RUNS"
            printf '%-36s %-62s %-22s %s\n' "--------" "----" "-----" "----"

            while IFS=$'\t' read -r workflow_id workflow_name workflow_path workflow_state; do
              run_count="$(gh api "/repos/$repo/actions/workflows/$workflow_id/runs?per_page=1" --jq '.total_count')"
              printf '%-36s %-62s %-22s %s\n' "$workflow_name" "$workflow_path" "$workflow_state" "$run_count"
            done < <(
              gh api --paginate "/repos/$repo/actions/workflows?per_page=100" \
                --jq '.workflows[] | [.id, .name, .path, .state] | @tsv'
            )
          } | tee "$report"

          encoded="$(base64 -w0 "$report")"
          jq -n \
            --arg message "Record Actions cleanup verification" \
            --arg content "$encoded" \
            --arg branch "main" \
            '{message: $message, content: $content, branch: $branch}' \
            > "$RUNNER_TEMP/report-payload.json"

          gh api --method PUT \
            "/repos/$repo/contents/.github/actions-cleanup-report.txt" \
            --input "$RUNNER_TEMP/report-payload.json" \
            >/dev/null
