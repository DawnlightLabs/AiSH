name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-v042:
    if: github.head_ref == 'fix/constrained-command-cards-v042'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Keep workflow changes out of generated commit
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/apply-v042.py')
          text = path.read_text()
          start = text.index('ci = subprocess.check_output(')
          end = text.index('Path(__file__).unlink()', start)
          path.write_text(text[:start] + text[end:])
          PY
      - name: Apply and test v0.4.2 implementation
        run: python3 tools/apply-v042.py
      - name: Commit implementation
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Constrain local command card generation"
          git push origin HEAD:${{ github.head_ref }}
