name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  cargo-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --workspace

  site-build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/site
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/site/package-lock.json
      - run: npm ci
      - run: npm run build

  powershell-syntax:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $files = @(
            'apps/site/public/install.ps1',
            'apps/provider-shell/src/windows_register.ps1',
            'apps/provider-shell/src/windows_uninstall.ps1'
          )
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }
