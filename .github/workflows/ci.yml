name: Apply Windows updater integration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/windows-update-helper-v043
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply integration
        run: |
          python3 .github/scripts/apply_windows_updater_patch.py
          cargo fmt --all
          cargo test -p aish-provider-shell
          cargo check --workspace
      - name: Restore normal CI and commit
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm .github/scripts/apply_windows_updater_patch.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/provider-shell/src/updater.rs apps/provider-shell/src/updater/windows_apply.rs docs/releases/v0.4.3.md .github/workflows/ci.yml .github/workflows/windows-updater-smoke.yml .github/scripts/apply_windows_updater_patch.py
          git commit -m "Fix Windows executable replacement"
          git push origin HEAD:fix/windows-update-helper-v043
