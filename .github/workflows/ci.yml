name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: write

jobs:
  cleanup-actions-history:
    runs-on: ubuntu-22.04
    steps:
      - name: Remove obsolete workflow history
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          repo="$GITHUB_REPOSITORY"
          deleted_runs=0
          cleaned_workflows=0

          keep_workflow() {
            case "$1" in
              .github/workflows/ci.yml|.github/workflows/version-bump.yml|.github/workflows/provider-release.yml|dynamic/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          while IFS=$'\t' read -r workflow_id workflow_name workflow_path workflow_state; do
            if keep_workflow "$workflow_path"; then
              echo "KEEP: $workflow_name [$workflow_path] ($workflow_state)"
              continue
            fi

            echo "CLEAN: $workflow_name [$workflow_path] ($workflow_state)"
            cleaned_workflows=$((cleaned_workflows + 1))

            # Prevent an orphaned workflow record from being run again.
            gh api \
              --method PUT \
              "/repos/$repo/actions/workflows/$workflow_id/disable" \
              >/dev/null 2>&1 || true

            mapfile -t run_ids < <(
              gh api --paginate \
                "/repos/$repo/actions/workflows/$workflow_id/runs?per_page=100" \
                --jq '.workflow_runs[] | select(.status == "completed") | .id'
            )

            for run_id in "${run_ids[@]}"; do
              [[ -n "$run_id" ]] || continue
              echo "  deleting run $run_id"
              gh api --method DELETE "/repos/$repo/actions/runs/$run_id"
              deleted_runs=$((deleted_runs + 1))
            done

            remaining="$(
              gh api "/repos/$repo/actions/workflows/$workflow_id/runs?per_page=1" \
                --jq '.total_count'
            )"
            if [[ "$remaining" != "0" ]]; then
              echo "::warning title=Workflow still has runs::$workflow_name has $remaining non-completed run(s) remaining"
            fi
          done < <(
            gh api --paginate "/repos/$repo/actions/workflows?per_page=100" \
              --jq '.workflows[] | [.id, .name, .path, .state] | @tsv'
          )

          echo "Cleaned $cleaned_workflows obsolete workflow records."
          echo "Deleted $deleted_runs obsolete workflow runs."

          echo "Remaining workflows:"
          gh api --paginate "/repos/$repo/actions/workflows?per_page=100" \
            --jq '.workflows[] | [.name, .path, .state] | @tsv'
