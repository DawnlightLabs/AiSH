name: Verify v0.4.1

on:
  push:
    branches:
      - fix/windows-installer-0.4.1
    paths:
      - .github/workflows/verify-v0.4.1.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Wait for complete release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          expected=(
            aish-windows-x64.zip
            aish-windows-x64.zip.sha256
            aish-windows-arm64.zip
            aish-windows-arm64.zip.sha256
            aish-macos-arm64.tar.gz
            aish-macos-arm64.tar.gz.sha256
            aish-linux-x64.tar.gz
            aish-linux-x64.tar.gz.sha256
            aish-linux-arm64.tar.gz
            aish-linux-arm64.tar.gz.sha256
            install
            install.sh
            install.ps1
          )
          verified=false
          missing=()
          for attempt in $(seq 1 60); do
            if release_json="$(gh api "repos/$GH_REPO/releases/tags/v0.4.1" 2>/dev/null)"; then
              mapfile -t published < <(jq -r '.assets[].name' <<< "$release_json")
              missing=()
              for file in "${expected[@]}"; do
                if ! printf '%s\n' "${published[@]}" | grep -Fxq "$file"; then
                  missing+=("$file")
                fi
              done
              if [[ ${#missing[@]} -eq 0 ]]; then
                verified=true
                break
              fi
            fi
            sleep 20
          done
          jq -n \
            --argjson verified "$verified" \
            --arg tag "v0.4.1" \
            --argjson missing "$(printf '%s\n' "${missing[@]:-}" | jq -R . | jq -s 'map(select(length > 0))')" \
            '{verified:$verified,tag:$tag,missing:$missing,checked_at:(now|todate)}' \
            > docs/release-v0.4.1-status.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/release-v0.4.1-status.json
          git commit -m "Record v0.4.1 release verification"
          git push
          test "$verified" = true
