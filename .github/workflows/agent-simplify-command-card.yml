name: Agent Simplify Command Card

on:
  push:
    branches:
      - agent/simplify-command-card
    paths:
      - .github/workflows/agent-simplify-command-card.yml

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/simplify-command-card
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Simplify model output and add local routing
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          structured = Path("crates/aish-ai/src/structured_output.rs")
          text = structured.read_text(encoding="utf-8")
          schema_start = text.index('pub(crate) const COMMAND_CARD_JSON_SCHEMA: &str = r#"')
          enum_start = text.index('#[derive(Debug, Clone, Copy, PartialEq, Eq)]')
          replacement = '''pub(crate) const COMMAND_CARD_JSON_SCHEMA: &str = r#"{
            "type": "object",
            "properties": {
              "action_type": { "type": "string", "enum": ["shell_command", "fallback_message"] },
              "command": { "type": "string" },
              "fallback_message": { "type": "string" }
            },
            "required": ["action_type", "command", "fallback_message"],
            "additionalProperties": false
          }"#;

          pub(crate) const COMMAND_CARD_GBNF: &str = r#"
          root ::= "{" ws action-kv "," ws command-kv "," ws fallback-kv "}" ws
          action-kv ::= "\\\"action_type\\\"" ws ":" ws ("\\\"shell_command\\\"" | "\\\"fallback_message\\\"")
          command-kv ::= "\\\"command\\\"" ws ":" ws string
          fallback-kv ::= "\\\"fallback_message\\\"" ws ":" ws string
          string ::= "\\\"" char* "\\\""
          char ::= [^"\\\\\\x7F\\x00-\\x1F] | "\\\\" (["\\\\/bfnrt] | "u" hex hex hex hex)
          hex ::= [0-9a-fA-F]
          ws ::= [ \\t\\n\\r]*
          "#;

          '''
          text = text[:schema_start] + replacement + text[enum_start:]
          text = text.replace(
              'assert_eq!(schema["required"].as_array().map(Vec::len), Some(5));',
              'assert_eq!(schema["required"].as_array().map(Vec::len), Some(3));',
              1,
          )
          old_fields = '''        for field in [
              "action_type",
              "command",
              "risk",
              "reason",
              "fallback_message",
          ] {'''
          new_fields = '''        for field in ["action_type", "command", "fallback_message"] {'''
          if old_fields not in text:
              raise SystemExit("structured_output.rs: grammar field test block not found")
          text = text.replace(old_fields, new_fields, 1)
          structured.write_text(text, encoding="utf-8")

          replace_once(
              "crates/aish-ai/src/lib.rs",
              '''    "You are AiSH's local shell planner. Produce one command card for the user's current shell. Return exactly one JSON object with action_type, command, risk, reason, and fallback_message. action_type is shell_command or fallback_message; keep the inactive command or fallback field empty. Use only the supplied operating system, shell, current context, and user intent. The command must be directly runnable in that shell and must not invent paths, filenames, usernames, installed tools, or facts. Read-only work is low risk; state-changing work is medium or high risk. The host independently validates risk and approval. Keep the reason brief.".to_string()''',
              '''    "You are AiSH's local shell planner. Return exactly one compact JSON object with action_type, command, and fallback_message. For runnable work, use action_type shell_command, put one directly runnable command in command, and leave fallback_message empty. For a question or a request that cannot be converted into one safe command, use action_type fallback_message, leave command empty, and put the response in fallback_message. Use only the supplied operating system, shell, context, and user intent. Never invent paths, filenames, usernames, installed tools, or facts. Do not include markdown or extra text. The host classifies risk and handles approval.".to_string()''',
          )

          replace_once(
              "crates/aish-ai/src/lib.rs",
              '''    matches!(
              object
                  .get("action_type")
                  .and_then(serde_json::Value::as_str),
              Some("shell_command" | "fallback_message")
          ) && object.get("command").is_some()
              && object.get("risk").is_some()
              && object.get("reason").is_some()
              && object.get("fallback_message").is_some()''',
              '''    matches!(
              object
                  .get("action_type")
                  .and_then(serde_json::Value::as_str),
              Some("shell_command" | "fallback_message")
          ) && object.get("command").and_then(serde_json::Value::as_str).is_some()
              && object
                  .get("fallback_message")
                  .and_then(serde_json::Value::as_str)
                  .is_some()''',
          )

          replace_once(
              "crates/aish-ai/src/lib.rs",
              '''    const CARD: &str = r#"{"action_type":"shell_command","command":"Set-Location \\"$HOME\\\\Downloads\\"","risk":"low","reason":"Navigate to Downloads.","fallback_message":""}"#;''',
              '''    const CARD: &str = r#"{"action_type":"shell_command","command":"Set-Location \\"$HOME\\\\Downloads\\"","fallback_message":""}"#;
              const LEGACY_CARD: &str = r#"{"action_type":"shell_command","command":"git status","risk":"low","reason":"Show status.","fallback_message":""}"#;''',
          )

          replace_once(
              "crates/aish-ai/src/lib.rs",
              '''    #[test]
              fn rejects_unrelated_json_objects() {
                  assert!(extract_command_card_json(r#"{"cwd":"C:/Users/Amaan"}"#).is_none());
              }''',
              '''    #[test]
              fn accepts_legacy_command_cards_during_upgrade() {
                  assert_eq!(extract_command_card_json(LEGACY_CARD).as_deref(), Some(LEGACY_CARD));
              }

              #[test]
              fn rejects_unrelated_json_objects() {
                  assert!(extract_command_card_json(r#"{"cwd":"C:/Users/Amaan"}"#).is_none());
              }''',
          )

          replace_once(
              "crates/aish-provider/src/lib.rs",
              '''fn plan_ai_run(input: &str, request: ProviderPlanRequest) -> ProviderPlan {
              let Some(profile) = request.profile else {''',
              '''fn plan_ai_run(input: &str, request: ProviderPlanRequest) -> ProviderPlan {
              if let Some(command) = deterministic_command(input) {
                  return evaluate_generated_command(
                      input,
                      &command,
                      None,
                      Some("Resolved locally without invoking the model."),
                      request.surface,
                      None,
                      Some("local_intent".to_string()),
                  );
              }

              let Some(profile) = request.profile else {''',
          )

          replace_once(
              "crates/aish-provider/src/lib.rs",
              '''fn parse_model_risk(value: Option<&str>) -> RiskLevel {''',
              '''fn deterministic_command(input: &str) -> Option<String> {
              let normalized = input
                  .trim()
                  .trim_end_matches(['.', '!'])
                  .to_ascii_lowercase();

              if matches!(
                  normalized.as_str(),
                  "aish -v"
                      | "aish -v "
                      | "aish --version"
                      | "aish version"
                      | "show aish version"
                      | "show the aish version"
              ) {
                  return Some("aish --version".to_string());
              }

              let mut request = normalized.as_str();
              if let Some(rest) = request.strip_prefix("please ") {
                  request = rest.trim();
              }

              let target = [
                  "go to ",
                  "navigate to ",
                  "change directory to ",
                  "switch to ",
                  "enter ",
              ]
              .iter()
              .find_map(|prefix| request.strip_prefix(prefix))?
              .trim()
              .trim_start_matches("the ")
              .trim_end_matches(" folder")
              .trim_end_matches(" directory")
              .trim();

              let relative = match target {
                  "downloads" | "download" => Some("Downloads"),
                  "desktop" => Some("Desktop"),
                  "documents" | "document" | "docs" => Some("Documents"),
                  "home" | "home folder" | "user folder" => Some(""),
                  "parent" | "parent folder" | "up" | "one level up" => {
                      return Some(if target_is_windows() {
                          "Set-Location ..".to_string()
                      } else {
                          "cd ..".to_string()
                      });
                  }
                  _ => None,
              }?;

              if target_is_windows() {
                  if relative.is_empty() {
                      Some("Set-Location \\"$env:USERPROFILE\\"".to_string())
                  } else {
                      Some(format!(
                          "Set-Location \\"$env:USERPROFILE\\\\{relative}\\""
                      ))
                  }
              } else if relative.is_empty() {
                  Some("cd \\"$HOME\\"".to_string())
              } else {
                  Some(format!("cd \\"$HOME/{relative}\\""))
              }
          }

          fn target_is_windows() -> bool {
              std::env::var("AISH_TARGET_OS")
                  .map(|value| value.eq_ignore_ascii_case("windows"))
                  .unwrap_or(std::env::consts::OS == "windows")
          }

          fn parse_model_risk(value: Option<&str>) -> RiskLevel {''',
          )

          provider = Path("crates/aish-provider/src/lib.rs")
          provider_text = provider.read_text(encoding="utf-8")
          provider_text += '''

          #[cfg(test)]
          mod local_intent_tests {
              use super::deterministic_command;

              #[test]
              fn resolves_common_navigation_without_the_model() {
                  std::env::set_var("AISH_TARGET_OS", "windows");
                  assert_eq!(
                      deterministic_command("go to downloads").as_deref(),
                      Some("Set-Location \\"$env:USERPROFILE\\\\Downloads\\"")
                  );
                  assert_eq!(
                      deterministic_command("please navigate to the desktop folder").as_deref(),
                      Some("Set-Location \\"$env:USERPROFILE\\\\Desktop\\"")
                  );
              }

              #[test]
              fn resolves_version_aliases_without_the_model() {
                  assert_eq!(deterministic_command("aish -v").as_deref(), Some("aish --version"));
                  assert_eq!(
                      deterministic_command("aish --version").as_deref(),
                      Some("aish --version")
                  );
              }

              #[test]
              fn leaves_general_language_for_the_model() {
                  assert!(deterministic_command("find large files in this project").is_none());
              }
          }
          '''
          provider.write_text(provider_text, encoding="utf-8")

          replace_once(
              "apps/provider-shell/src/main_setup.rs",
              '''        "cls",
              "git",''',
              '''        "cls",
              "aish",
              "git",''',
          )
          replace_once(
              "apps/provider-shell/src/main_setup.rs",
              '''        assert!(looks_like_command_attempt("go version"));
              assert!(looks_like_command_attempt(".\\\\tools\\\\build.ps1"));''',
              '''        assert!(looks_like_command_attempt("go version"));
              assert!(looks_like_command_attempt("aish --version"));
              assert!(looks_like_command_attempt("aish -v"));
              assert!(looks_like_command_attempt(".\\\\tools\\\\build.ps1"));''',
          )

          replace_once(
              "apps/provider-shell/src/updater.rs",
              '''    if args.iter().any(|arg| arg == "--version" || arg == "-V") {''',
              '''    if args
                  .iter()
                  .any(|arg| arg == "--version" || arg == "-V" || arg == "-v")
              {''',
          )
          PY

      - name: Format
        run: cargo fmt --all

      - name: Test command planning
        run: cargo test -p aish-ai -p aish-provider -p aish-provider-shell

      - name: Commit patch and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent-simplify-command-card.yml
          git add crates/aish-ai/src/structured_output.rs crates/aish-ai/src/lib.rs crates/aish-provider/src/lib.rs apps/provider-shell/src/main_setup.rs apps/provider-shell/src/updater.rs
          git commit -m "Simplify local model command planning"
          git push origin HEAD:agent/simplify-command-card
