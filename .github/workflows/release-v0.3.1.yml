name: Release v0.3.1

on:
  push:
    branches:
      - release/v0.3.1
    paths:
      - .github/workflows/release-v0.3.1.yml

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Bump, tag, and dispatch patch release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/provider-shell/Cargo.toml')
          text = path.read_text()
          old = 'version = "0.3.0"'
          new = 'version = "0.3.1"'
          if old not in text:
              raise SystemExit('expected provider version 0.3.0 was not found')
          path.write_text(text.replace(old, new, 1))
          PY

          cargo check -p aish-provider-shell

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/provider-shell/Cargo.toml Cargo.lock
          git commit -m "Bump AiSH to v0.3.1"
          git push origin HEAD:main

          git tag v0.3.1
          git push origin v0.3.1

          gh workflow run provider-release.yml \
            --repo "$GH_REPO" \
            --ref main \
            -f version=v0.3.1 \
            -f make_latest=true \
            -f prerelease=false
