name: Validate AiSH 0.3.0

on:
  push:
    branches:
      - agent/aish-0.3.0-lifecycle

permissions:
  contents: read

jobs:
  cargo-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --workspace

  powershell-syntax:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $files = @(
            'apps/site/public/install.ps1',
            'apps/provider-shell/src/windows_register.ps1',
            'apps/provider-shell/src/windows_uninstall.ps1'
          )
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }
